name: endecaprio_v4
description: EnDecaprioV4 - Proprietary Text Encryption System
publish_to: 'none'
version: 4.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Encryption
  cryptography: ^2.7.0
  pointycastle: ^3.7.4

  # Database
  sqflite_common_ffi: ^2.3.3
  sqflite: ^2.3.2
  path: ^1.9.0

  # Secure Storage
  flutter_secure_storage: ^9.2.2


  # Utils
  uuid: ^4.3.3
  path_provider: ^2.1.2
  intl: ^0.19.0
  share_plus: ^7.2.2
  url_launcher: ^6.2.5
  ffi: ^2.1.2

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.6

  http: ^1.2.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Regular.ttf
        - asset: assets/fonts/Sora-Bold.ttf
          weight: 700
          
flutter_launcher_icons:
  android: true
  ios: true
  windows: true
  image_path: "assets/icon/icon.ico"